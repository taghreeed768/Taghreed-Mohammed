<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Layout</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ff4d00; /* البرتقالي */
    padding:20px;
    font-family:Georgia, serif;
}

.container{
    display:grid;
    grid-template-columns: 1fr 2fr 1fr;
    grid-template-rows: 120px 400px 120px;
    gap:30px;
    height:100vh;
}

header{
    grid-column:1 / 4;
    background:#5e3f8c;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:40px;
    font-weight:bold;
}

nav{
    background:#8a73a8;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:35px;
    font-weight:bold;
}

main{
    background:#8a73a8;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:35px;
    font-weight:bold;
}

aside{
    background:#8a73a8;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:35px;
    font-weight:bold;
}

footer{
    grid-column:1 / 4;
    background:#5e3f8c;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:40px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<header>header</header>

<nav>nav</nav>

<main>content</main>

<aside>sidebar</aside>

<footer>footer</footer>

</div>

</body>
</html>
